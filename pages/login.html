<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio Vault — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body { font-family: "Inter", sans-serif; }
    </style>
  </head>
  <body class="bg-stone-50 min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
      <div class="mb-8 text-center">
        <h1 class="text-3xl font-black text-stone-900 tracking-tight">
          Studio<span class="text-transparent bg-clip-text bg-gradient-to-r from-[#0C75DD] to-[#3a96f1]">Vault.</span>
        </h1>
      </div>

      <div class="bg-white rounded-3xl shadow-xl border border-stone-100 p-8">
        <div id="errorMsg" class="hidden mb-4 px-4 py-3 rounded-xl bg-red-50 border border-red-100 text-red-600 text-sm font-semibold"></div>

        <form id="loginForm" class="space-y-4">
          <div>
            <label class="block text-xs font-black text-stone-400 uppercase tracking-widest mb-1.5">Email</label>
            <input
              type="email"
              id="emailInput"
              required
              autocomplete="email"
              class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl text-sm font-medium focus:outline-none focus:ring-2 focus:border-[#0C75DD] transition-all"
              style="--tw-ring-color: rgba(12,117,221,0.2)"
            />
          </div>

          <div>
            <label class="block text-xs font-black text-stone-400 uppercase tracking-widest mb-1.5">Password</label>
            <input
              type="password"
              id="passwordInput"
              required
              autocomplete="current-password"
              class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl text-sm font-medium focus:outline-none focus:ring-2 focus:border-[#0C75DD] transition-all"
              style="--tw-ring-color: rgba(12,117,221,0.2)"
            />
          </div>

          <button
            type="submit"
            id="submitBtn"
            class="w-full bg-[#0C75DD] hover:bg-[#0a61b9] text-white py-3 rounded-xl font-bold text-sm transition-all shadow-lg shadow-blue-100 mt-2 disabled:opacity-60 disabled:cursor-not-allowed"
          >
            Sign In
          </button>
        </form>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyC-qUsW2JmjDkcLfB1W7kT-jQtxFi6VfEk",
        authDomain: "matt-vault-app.firebaseapp.com",
        projectId: "matt-vault-app",
        storageBucket: "matt-vault-app.firebasestorage.app",
        messagingSenderId: "435451171052",
        appId: "1:435451171052:web:9643b9194436f8691f95c9",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // Redirect if already logged in
      onAuthStateChanged(auth, (user) => {
        if (user) window.location.href = "../index.html";
      });

      const form = document.getElementById("loginForm");
      const emailInput = document.getElementById("emailInput");
      const passwordInput = document.getElementById("passwordInput");
      const submitBtn = document.getElementById("submitBtn");
      const errorMsg = document.getElementById("errorMsg");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorMsg.classList.add("hidden");
        submitBtn.disabled = true;
        submitBtn.textContent = "Signing in…";

        try {
          await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
          window.location.href = "../index.html";
        } catch (err) {
          const messages = {
            "auth/invalid-credential": "Invalid email or password.",
            "auth/user-not-found": "No account found with that email.",
            "auth/wrong-password": "Incorrect password.",
            "auth/too-many-requests": "Too many attempts. Please try again later.",
          };
          errorMsg.textContent = messages[err.code] || "Sign in failed. Please try again.";
          errorMsg.classList.remove("hidden");
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
        }
      });
    </script>
  </body>
</html>
