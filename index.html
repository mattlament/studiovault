<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio Vault</title>
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Chosen Palette: Custom Studio Blue (#0C75DD) -->

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #fafaf9;
        color: #1c1917;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .card-hover:hover {
        transform: translateY(-8px);
      }
      .dropdown-animate {
        animation: slideDown 0.2s ease-out;
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      /* Custom scrollbar for tag list */
      #tagList::-webkit-scrollbar {
        width: 4px;
      }
      #tagList::-webkit-scrollbar-track {
        background: transparent;
      }
      #tagList::-webkit-scrollbar-thumb {
        background: #e7e5e4;
        border-radius: 10px;
      }

      /* Custom Accent Colors */
      .text-custom-blue {
        color: #0c75dd;
      }
      .bg-custom-blue {
        background-color: #0c75dd;
      }
      .border-custom-blue {
        border-color: #0c75dd;
      }
      .ring-custom-blue {
        --tw-ring-color: rgba(12, 117, 221, 0.2);
      }
      .hover-bg-custom-blue:hover {
        background-color: #0a61b9;
      }
    </style>
  </head>
  <body class="antialiased min-h-screen">
    <!-- 
        Application Structure Plan: 
        The SPA is designed as an 'Inspiration Dashboard'. 
        1. Header: Functional area for discovery (Search) and expansion (Add Studio). 
        2. Control Bar: A multi-select category pull-down and sorting logic. Default sorting is Alphabetical.
        3. Main Grid: 180+ interactive cards with high-performance Vanilla JS rendering.
    -->

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
      <!-- HEADER -->
      <header
        class="mb-12 flex flex-col lg:flex-row justify-between items-start gap-8"
      >
        <div class="flex-1">
          <div
            class="flex items-center gap-2 mb-2 text-custom-blue font-bold tracking-tighter uppercase text-sm"
          >
            <i data-lucide="sparkles" class="w-4 h-4"></i>
            <span>Inspiration Archive</span>
          </div>
          <h1 class="text-5xl font-black text-stone-900 tracking-tight">
            Studio<span
              class="text-transparent bg-clip-text bg-gradient-to-r from-[#0C75DD] to-[#3a96f1]"
              >Vault.</span
            >
          </h1>
          <p class="mt-2 text-stone-500 max-w-md text-lg font-medium">
            A curated collection of creative.
          </p>
        </div>

        <div class="flex flex-col gap-4 w-full md:w-auto md:items-end">
          <!-- Search Bar -->
          <div class="relative w-full md:w-64 group">
            <i
              data-lucide="search"
              class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-stone-400 group-focus-within:text-custom-blue transition-colors"
            ></i>
            <input
              type="text"
              id="searchInput"
              placeholder="Search..."
              class="w-full pl-11 pr-10 py-3 bg-white border border-stone-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 ring-custom-blue focus:border-custom-blue transition-all text-sm font-medium"
            />
            <button
              id="clearSearch"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-300 hover:text-stone-500 hidden transition-colors"
            >
              <i data-lucide="x" class="w-4 h-4"></i>
            </button>
          </div>

          <!-- Add Form -->
          <div
            class="flex flex-col sm:flex-row gap-2 bg-white p-2 rounded-2xl shadow-xl border border-stone-100 w-full md:w-auto"
          >
            <input
              type="text"
              id="newStudioName"
              placeholder="Studio Name"
              class="px-4 py-2 rounded-xl bg-stone-50 focus:outline-none focus:ring-2 ring-custom-blue transition-all text-sm md:w-32 lg:w-40"
            />
            <input
              type="text"
              id="newStudioUrl"
              placeholder="Paste URL..."
              class="px-4 py-2 rounded-xl bg-stone-50 focus:outline-none focus:ring-2 ring-custom-blue transition-all text-sm md:w-40 lg:w-48"
            />
            <button
              id="addStudioBtn"
              class="bg-custom-blue hover-bg-custom-blue text-white p-2 rounded-xl transition-all flex items-center justify-center gap-2 px-4 font-semibold text-sm whitespace-nowrap group shadow-lg shadow-blue-100"
            >
              <i
                data-lucide="plus"
                class="w-4 h-4 group-hover:rotate-90 transition-transform"
              ></i>
              <span>Add Studio</span>
            </button>
          </div>
        </div>
      </header>

      <!-- TOOLBAR -->
      <div
        class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8 pb-4 border-b border-stone-200 gap-4"
      >
        <div
          class="flex items-center gap-2 text-stone-500 text-sm font-semibold tracking-tight"
        >
          <i data-lucide="layout-grid" class="w-4 h-4 text-stone-400"></i>
          <span id="resultCount">0 studios saved</span>
        </div>

        <div class="flex items-center gap-3 w-full sm:w-auto">
          <!-- Multi-Select Categories -->
          <div class="relative" id="filterDropdownContainer">
            <button
              id="filterToggle"
              class="flex items-center gap-2 px-4 py-2.5 bg-white border border-stone-200 rounded-xl text-[11px] font-black uppercase tracking-[0.12em] text-stone-500 transition-all hover:border-custom-blue"
            >
              <i data-lucide="filter" class="w-3.5 h-3.5 text-stone-400"></i>
              <span id="filterLabel">Filter Categories</span>
              <i
                data-lucide="chevron-down"
                class="w-3.5 h-3.5 text-stone-400"
              ></i>
            </button>

            <div
              id="filterMenu"
              class="absolute right-0 top-full mt-2 w-64 bg-white border border-stone-100 shadow-2xl rounded-2xl z-50 hidden dropdown-animate overflow-hidden"
            >
              <div
                class="p-2 border-b border-stone-50 flex items-center justify-between bg-stone-50/50"
              >
                <span
                  class="text-[10px] font-bold text-stone-400 uppercase px-2"
                  >Select Types</span
                >
                <button
                  id="clearFilters"
                  class="text-[10px] font-bold text-custom-blue hover:text-custom-blue px-2 transition-colors"
                >
                  Clear All
                </button>
              </div>
              <div
                id="tagList"
                class="max-h-72 overflow-y-auto py-2 px-2 grid grid-cols-1 gap-1"
              >
                <!-- Tags injected via JS -->
              </div>
            </div>
          </div>

          <!-- Sorting -->
          <div class="relative">
            <select
              id="sortSelect"
              class="appearance-none bg-white border border-stone-200 rounded-xl px-4 pr-10 py-2.5 text-[11px] font-black text-stone-500 uppercase tracking-[0.12em] focus:outline-none focus:ring-2 ring-custom-blue cursor-pointer w-full transition-all hover:border-custom-blue"
            >
              <option value="alpha">A — Z</option>
              <option value="recent">Recently Added</option>
            </select>
            <i
              data-lucide="chevron-down"
              class="absolute right-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-stone-400 pointer-events-none"
            ></i>
          </div>
        </div>
      </div>

      <!-- GRID -->
      <div
        id="studioGrid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
      >
        <!-- Cards injected via JS -->
      </div>

      <!-- EMPTY STATE -->
      <div
        id="emptyState"
        class="hidden text-center py-32 bg-white rounded-[40px] border-2 border-dashed border-stone-200"
      >
        <div
          class="w-16 h-16 bg-stone-50 rounded-full flex items-center justify-center mx-auto mb-4 text-stone-400"
        >
          <i data-lucide="search" class="w-8 h-8"></i>
        </div>
        <p class="text-stone-400 font-bold text-lg">
          No results match your filters.
        </p>
        <p
          class="text-stone-300 text-sm mt-1 uppercase tracking-widest font-black"
        >
          Try clearing your search or filters
        </p>
      </div>
    </div>
  </body>

  <script src="./studios.js" type="module"></script>
  <script src="./firebase.js" type="module"></script>
  <script src="./application.js" type="module"></script>
</html>
